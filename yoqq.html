<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video YouTube | Blog</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
        }
        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .video-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        iframe {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: none;
            border-radius: 8px;
        }
        .description {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 10px;
            font-size: 16px;
        }
        footer {
            text-align: center;
            background: #222;
            color: white;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Video YouTube</h1>
    <p>Embed dari YouTube</p>
</header>

<div class="video-container">
    <!-- Embed Video YouTube dari link yang kamu kirim -->
    <iframe 
        src="https://www.youtube.com/embed/iqGAW57EudQ" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<div class="description">
    <h2>Lirik Lagu</h2>
    <p>
        Di atas adalah video YouTube yang kamu pilih (dari link https://youtu.be/iqGAW57EudQ).
        Kamu bisa ganti teks judul/deskripsi sesuai keinginanmu.
    </p>
</div>

<footer>
    Ⓒ 2026 Blog Video YouTube
</footer>

</body>
</html>
